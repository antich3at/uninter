const dados = {
  1: {

    professor: "Prof. Gian Carlo Brustolin",
    resumo: `
      <div class="secao-titulo">Introdução</div>
      <div class="card"><div class="card-header azul-m">Contexto da Disciplina</div><div class="card-body">
        <p class="corpo">A tecnologia da informação e comunicação (TIC) tornou-se uma necessidade essencial como água, energia e gás. Porém, ao contrário dessas, a segurança digital ainda não está sedimentada na cultura — por ser uma incorporação muito recente aos nossos hábitos.</p>
        <div class="importante">⭐ Esta disciplina busca disseminar os conhecimentos básicos de segurança da informação, essenciais para qualquer profissional de tecnologia.</div>
      </div></div>

      <div class="secao-titulo">Tema 1 — Mundo Digital</div>
      <div class="card"><div class="card-header">1.1 Informação e Conhecimento</div><div class="card-body">
        <p class="corpo"><strong>Peter Drucker</strong> cunhou o termo <strong>"sociedade da informação"</strong> em <strong>1966</strong>, no livro <em>The Age of Discontinuity</em>. <strong>Manuel Castells (1999)</strong> estudou os impactos da sociedade da informação na economia, educação e comportamento humano, prevendo alterações significativas e irreversíveis.</p>
        <p class="corpo">A grande disponibilidade de dados cria a <strong>ilusão de insignificância</strong> da informação. Não há rótulos que distingam informações válidas das inválidas — fácil ser vítima de <strong>desinformação</strong>. A facilidade de acesso também é aparente: a complexidade tecnológica é <strong>translúcida</strong> — só percebemos quando o processo entra em colapso.</p>
        <div class="importante">⭐ Conclusão de Castells: o poder se desloca para quem <strong>gera, transmite e processa</strong> a informação. A capacidade de coletar informações corretas e transformá-las em conhecimento é o <strong>grande diferencial competitivo</strong> individual ou organizacional (Kolbe, 2017).</div>
        <p class="corpo">As características que dão valor a um dado: <strong>integridade, disponibilidade e autenticidade</strong> — bases da segurança da informação.</p>
      </div></div>

      <div class="card"><div class="card-header">1.2 Informação e Tecnologia</div><div class="card-body">
        <p class="corpo">O valor de uma empresa está menos em seus ativos físicos (máquinas, veículos, mobiliário) e mais no <strong>conhecimento do negócio</strong> (processos de produção, fornecedores, clientes). As fronteiras entre o valor empresarial e os repositórios digitais tornaram-se tênues.</p>
        <p class="corpo">As áreas de TIC deixaram de ser apenas administradoras de hardware/software para <strong>analisar os efeitos e desafios que a tecnologia traz para a organização</strong> (Kolbe, 2017). Dados precisam ser preservados em instalações resilientes como <strong>datacenters</strong>.</p>
        <p class="corpo">Sistemas modernos utilizam <strong>Big Data, aprendizado de máquina e redes neurais artificiais</strong> para extrair informações de alto valor — cujo sucesso depende fundamentalmente da qualidade e segurança dos dados.</p>
      </div></div>

      <div class="secao-titulo">Tema 2 — Conceitos de Sistemas da Informação</div>
      <div class="card"><div class="card-header">Origem + Blocos de Hardware</div><div class="card-body">
        <p class="corpo"><strong>Alan Turing</strong> criou a primeira máquina computacional operacional durante a Segunda Guerra Mundial para decodificar mensagens das tropas nazistas (máquina <strong>Enigma</strong>). Desde então, a necessidade de algoritmos mais complexos gera demanda por máquinas mais potentes.</p>
        <table>
          <tr><th>Bloco</th><th>Componentes</th><th>Função</th></tr>
          <tr><td><strong>Processamento</strong></td><td>CPU + memórias (RAM/ROM)</td><td>Executa códigos seguindo o clock; toma decisões</td></tr>
          <tr><td><strong>Comunicação</strong></td><td>WiFi, LTE, cabos metálicos/ópticos</td><td>Conecta ao mundo externo e a outros sistemas</td></tr>
          <tr><td><strong>I/O Digital (GP I/O)</strong></td><td>Entradas e saídas digitais</td><td>Lê dados externos e aciona dispositivos</td></tr>
          <tr><td><strong>I/O Analógicas</strong></td><td>Sensores e atuadores</td><td>Interface com o mundo físico</td></tr>
        </table>
        <p class="corpo">A velocidade do computador é determinada pelo <strong>clock</strong>. O funcionamento do bloco de processamento é idêntico em todas as máquinas: servidores, PCs, tablets, smartphones e dispositivos IoT — a diferença está na capacidade computacional.</p>
        <div class="destaque">⚠️ Toda vez que dados são transmitidos pela rede, surgem novos riscos à integridade. Os <strong>protocolos de comunicação</strong> são técnicas de mitigação desses riscos.</div>
      </div></div>

      <div class="card"><div class="card-header">2.2 Sistemas da Informação (SIGs)</div><div class="card-body">
        <p class="corpo">Sistema = <strong>"grupo de componentes inter-relacionados que trabalham rumo a uma meta comum"</strong> (Kolbe, 2017). Os <strong>SIGs (Sistemas de Informação Gerenciais)</strong> automatizam rotinas administrativas como emissão de notas fiscais, controle de estoque e folha de pagamento.</p>
      </div></div>

      <div class="secao-titulo">Tema 3 — Sistemas nas Corporações</div>
      <div class="card"><div class="card-header">3.1 Empresas Privadas</div><div class="card-body">
        <table>
          <tr><th>Sistema</th><th>Nome completo</th><th>Função</th></tr>
          <tr><td><strong>ERP / SIGE</strong></td><td>Enterprise Resource Planning</td><td>Integra todos os sistemas de gestão da empresa</td></tr>
          <tr><td><strong>CRM</strong></td><td>Customer Relationship Management</td><td>Gerencia o relacionamento comercial com cada cliente</td></tr>
          <tr><td><strong>BI</strong></td><td>Business Intelligence</td><td>Analisa e entende o desempenho empresarial</td></tr>
        </table>
        <p class="corpo">Com o crescimento dos dados, surgiram os <strong>datacenters</strong>. A migração para a nuvem aportou maior segurança com alta disponibilidade e elevados padrões de proteção.</p>
      </div></div>

      <div class="card"><div class="card-header">3.2 Empresas Públicas</div><div class="card-body">
        <p class="corpo">Focos: <strong>transparência e eficiência</strong> dos serviços, atrelados à proteção da privacidade dos dados. A disseminação da informação mobiliza e acelera as organizações públicas (Kolbe, 2017).</p>
        <div class="importante">⭐ <strong>LGPD — Lei n. 13.709, de 14 de agosto de 2018</strong><br>Estabelece a necessidade de garantir a <strong>inviolabilidade dos dados</strong> e a <strong>auditabilidade dos tratamentos</strong> aos quais os dados dos cidadãos são submetidos.</div>
      </div></div>

      <div class="secao-titulo">Tema 4 — Valor da Informação</div>
      <div class="card"><div class="card-header">4.1 Dado × Informação × Conhecimento</div><div class="card-body">
        <table>
          <tr><th>Nível</th><th>Descrição</th><th>Características</th></tr>
          <tr><td><strong>Dado</strong></td><td>Simples observação do estado do mundo</td><td>Facilmente estruturado, obtido por máquinas, quantificado e transferível</td></tr>
          <tr><td><strong>Informação</strong></td><td>Dados tratados e selecionados estruturadamente</td><td>Requer unidade de análise, consenso e mediação humana; difícil de estruturar</td></tr>
          <tr><td><strong>Conhecimento</strong></td><td>Reflexão inteligente sobre informações</td><td>Frequentemente tácito (não escrito); difícil de capturar em máquinas e de transferir</td></tr>
        </table>
        <div class="destaque"><strong>Exemplo:</strong> Coletor de temperatura sofre pane 30min. Dados brutos = válidos + inválidos (dado). Computador exclui inválidos e calcula média correta (informação). Usuário relaciona temperatura com consumo de água dos colaboradores (conhecimento).</div>
      </div></div>

      <div class="card"><div class="card-header">4.2 Classificação por Sigilo + 4.3 Hierarquia</div><div class="card-body">
        <div class="importante">⭐ Há relação direta entre <strong>valor da informação e seu sigilo</strong>.<br>Graus: <strong>Pública → Reservada → Confidencial</strong> (valor cresce conforme o sigilo aumenta)</div>
        <table>
          <tr><th>Nível Hierárquico</th><th>Usuários</th><th>Tipo de informação</th></tr>
          <tr><td><strong>Operacional</strong></td><td>Corpo técnico e administrativo</td><td>Informações detalhadas para tarefas cotidianas</td></tr>
          <tr><td><strong>Gerencial</strong></td><td>Gestão intermediária</td><td>Informações combinadas para decisões táticas</td></tr>
          <tr><td><strong>Estratégico</strong></td><td>Alta gerência</td><td>IA e BI para decisões complexas (ex: internacionalização)</td></tr>
        </table>
      </div></div>

      <div class="card"><div class="card-header">4.4 Ciclo de Vida da Informação</div><div class="card-body">
        <div class="importante">⭐ <strong>Produção → Manuseio → Armazenamento → Transporte → Descarte</strong><br>Em cada fase surgem riscos distintos que exigem procedimentos específicos de segurança.</div>
        <table>
          <tr><th>Fase</th><th>O que ocorre</th><th>Risco principal</th></tr>
          <tr><td>Produção</td><td>Coleta do dado bruto</td><td>Dados inválidos na origem</td></tr>
          <tr><td>Manuseio</td><td>Transformação em informação</td><td>Alteração indevida do conteúdo</td></tr>
          <tr><td>Armazenamento</td><td>Guarda com classificação de sigilo</td><td>Acesso não autorizado; dados confidenciais exigem servidores robustos</td></tr>
          <tr><td>Transporte</td><td>Transmissão pela rede</td><td>Interceptação durante a transmissão</td></tr>
          <tr><td>Descarte</td><td>Eliminação quando inútil</td><td>Recuperação indevida de dados descartados</td></tr>
        </table>
      </div></div>

      <div class="secao-titulo">Tema 5 — Conceitos de Segurança da Informação</div>
      <div class="card"><div class="card-header">5.1 Segurança no Organograma</div><div class="card-body">
        <p class="corpo">As áreas de segurança evoluíram de gerências dentro de TI para diretorias independentes, após a sedimentação de legislações internacionais sobre privacidade e o reconhecimento do valor dos dados corporativos.</p>
        <p class="corpo">Surgiu a figura do <strong>CSO (Chief Security Officer)</strong> — alto executivo que dirige os esforços corporativos de segurança, ligado diretamente à alta administração.</p>
      </div></div>

      <div class="card"><div class="card-header">5.2 As 7 Características da Informação Segura</div><div class="card-body">
        <div class="destaque">⭐ <strong>Conceito mais importante da aula! Memorize todas as 7.</strong></div>
        <table>
          <tr><th>#</th><th>Característica</th><th>O que garante</th></tr>
          <tr style="background:#d6e8f7"><td>1</td><td>🔒 <strong>Confidencialidade</strong></td><td>Só quem é autorizado acessa — mantida por todo o ciclo de vida</td></tr>
          <tr style="background:#d6e8f7"><td>2</td><td>✅ <strong>Integridade</strong></td><td>A informação não foi alterada indevidamente</td></tr>
          <tr style="background:#d6e8f7"><td>3</td><td>📡 <strong>Disponibilidade</strong></td><td>Acessível sempre que necessário</td></tr>
          <tr><td>4</td><td>🪪 Autenticidade</td><td>É genuinamente de quem diz ser</td></tr>
          <tr><td>5</td><td>🚫 Irretratabilidade (Não repúdio)</td><td>O autor não pode negar a autoria</td></tr>
          <tr><td>6</td><td>🛡️ Privacidade</td><td>Dados pessoais protegidos conforme LGPD e compliance</td></tr>
          <tr><td>7</td><td>🔍 Auditabilidade</td><td>Possível verificar todas as características durante todo o ciclo de vida</td></tr>
        </table>
        <div class="importante">As 3 primeiras formam a <strong>Tríade CIA</strong> — as mais importantes para segurança de dispositivos. As demais foram inseridas pelos processos de compliance corporativo.</div>
      </div></div>

      <div class="card"><div class="card-header azul-m">Na Prática — Certificado Digital e Hash</div><div class="card-body">
        <p class="corpo">Um <strong>certificado digital</strong> comprova a identidade de um internauta (ou computador/software) para operações seguras na rede. Sua autenticidade é verificável junto a uma <strong>Autoridade Certificadora (CA)</strong>, estabelecida legalmente. A CA confere uma chave ao interessado.</p>
        <p class="corpo">Com o certificado, pode-se <strong>assinar digitalmente</strong> um documento, garantindo: <strong>autenticidade</strong> e <strong>irretratabilidade (não repúdio)</strong> — quem assinou não pode negar a autoria.</p>
        <div class="destaque">⚠️ <strong>Problema:</strong> O texto poderia ser corrompido mantendo apenas a assinatura intacta.<br><strong>Solução — Hash:</strong> Função que gera um valor numérico único para o conteúdo. Qualquer alteração no documento geraria um hash diferente — detectando adulteração mesmo com a assinatura intacta.</div>
        <p class="corpo">As características da informação segura orientam todas as ações sobre dados, informações, conhecimento e sistemas para mantê-los seguros.</p>
      </div></div>`,
    questoes: [
      { tipo:"mc", enunciado:"Quem cunhou o termo 'sociedade da informação' e em que ano?", opcoes:["Manuel Castells, em 1999","Peter Drucker, em 1966","Alan Turing, em 1945","Kolbe, em 2017"], correta:1, explicacao:"Peter Drucker cunhou o termo em 1966, no livro The Age of Discontinuity." },

    </div></div>

    <div class="card"><div class="card-header">2.2 Registros em um BD</div><div class="card-body">
      <p class="corpo">Todo dado em um BD é armazenado como <strong>números binários</strong>. Para dar significado a esses números, o SGBD cria um <strong>"dicionário" de metadados</strong> durante a criação do BD — contendo informações descritivas dos dados (tipos, estruturas e restrições).</p>
      <p class="corpo">Um <strong>registro</strong> é um ou mais dados digitais indexáveis em um BD. Não há tamanho fixo. Exemplo: o nome "Marcelo" é armazenado como a sequência hexadecimal equivalente de cada letra (ASCii). Além do dado, há <strong>marcadores de início e fim de registro</strong>, também gerenciados pelo SGBD.</p>
    </div></div>

    <div class="card"><div class="card-header">2.3 Acesso a um Registro (Query)</div><div class="card-body">
      <p class="corpo">Para acessar registros, o usuário (humano ou computacional) envia uma <strong>query</strong> (busca) padronizada ao SGBD. Cada SGBD tem seus comandos, mas há padrões conhecidos.</p>
      <div class="destaque"><strong>Exemplo SQL:</strong> <code>SELECT * FROM PRODUTOS</code> → retorna todos os registros da tabela Produtos (código, nome, estoque, custo).<br><strong>Comando JOIN:</strong> busca registros em mais de uma tabela simultaneamente ou combina tabelas matematicamente, criando uma nova tabela resultante.</div>
    </div></div>

    <div class="secao-titulo">Tema 3 — Funções do SGBD e Segurança</div>
    <div class="card"><div class="card-header">3.1 Operações e Segurança</div><div class="card-body">
      <p class="corpo">Não existem fronteiras de rede obrigatórias entre SI e SGBD — o BD pode residir centralizado em outra sede da corporação. SIs enviam requisições remotamente. Sistemas web permitem acesso por dispositivos remotos, independente de rede privada.</p>
      <div class="destaque">⚠️ O transporte de requisições e dados pela rede ou internet insere <strong>latência</strong> e <strong>vulnerabilidades</strong> que ameaçam a segurança. O SGBD pode ter grande parte de seu trabalho dedicado à segurança das transações.</div>
    </div></div>

    <div class="card"><div class="card-header">3.2 Preservação de Dados e Latência</div><div class="card-body">
      <p class="corpo">Um BD tende a existir por muitos anos. O SGBD deve implementar estratégias de preservação da <strong>integridade</strong>. Exemplo de risco: falha no cabeçote de gravação ou pico de energia durante gravação em SSD — o dado não será íntegro (ex: salário corrompido gera erro na folha de pagamento).</p>
      <p class="corpo">O SGBD aplica <strong>operações matemáticas</strong> (códigos de redundância) para detectar e eventualmente corrigir erros:</p>
      <div class="destaque">
        Dado: <strong>1234</strong> → soma dos dígitos: 1+2+3+4 = <strong>10</strong> → gravado como <strong>1234 10</strong><br>
        Na leitura: dado = <strong>1237</strong> → soma: 1+2+3+7 = <strong>12 ≠ 10</strong> → dado <strong>não é íntegro</strong> (detectado!)<br>
        Para <em>corrigir</em> (além de detectar), seria necessária uma segunda soma parcial. Aprofundamento: pesquisar <strong>CRC (Cyclic Redundancy Check)</strong>.
      </div>
      <p class="corpo"><strong>Latência</strong> = tempo total entre a saída de uma requisição e o retorno do resultado. Maior fator: trânsito de pacotes na rede. O SGBD administra requisições simultâneas com <strong>estratégias de fila e priorização</strong> para minimizar a latência e garantir a <strong>disponibilidade</strong>.</p>
    </div></div>

    <div class="secao-titulo">Tema 4 — Outras Arquiteturas de Recipientes de Dados</div>
    <div class="card"><div class="card-header">Visão Geral + 4.1 Exportação de Dados</div><div class="card-body">
      <p class="corpo">Nem sempre todos os SIs corporativos são compatíveis com o mesmo BD/SGBD — por questões técnicas ou legais. Isso gera problemas de integração.</p>
      <p class="corpo"><strong>Exportação de dados</strong> é solução simples, mas pode <strong>romper a consistência temporal</strong> dos dados (Kolbe Júnior, 2017).</p>
      <div class="destaque"><strong>Exemplo:</strong> SI de faturamento consulta custos do SI de estoque. Se a consulta ocorre no momento errado (entre atualizações de custo), o preço calculado será baseado em dado desatualizado — a loja pode operar em prejuízo até nova query.</div>
    </div></div>

    <div class="card"><div class="card-header">4.2 Data Warehouse (DW) / 4.3 Data Mart (DM) / 4.4 Data Lake (DL)</div><div class="card-body">
      <table>
        <tr><th>Arquitetura</th><th>O que armazena</th><th>Para que serve</th></tr>
        <tr><td><strong>Data Warehouse (DW)</strong></td><td>Dados <strong>estruturados</strong> (já processados por SIs)</td><td>Compartilhamento consistente entre SIs incompatíveis; histórico gerencial. Suporta: OLAP, mineração de dados, big data.</td></tr>
        <tr><td><strong>Data Mart (DM)</strong></td><td>Cópia <strong>parcial</strong> do DW</td><td>Quando um SI específico (ex: CRM) precisa de parte do DW com uso muito intenso — evita sobrecarga no DW principal.</td></tr>
        <tr><td><strong>Data Lake (DL)</strong></td><td>Dados <strong>brutos e estruturados</strong> indiferentemente</td><td>Análises de ciência de dados: deep learning, machine learning, extração de significado.</td></tr>
      </table>
    </div></div>

    <div class="secao-titulo">Tema 5 — Segurança em BDs</div>
    <div class="card"><div class="card-header">5.1 Ameaças + 5.2 As 4 Medidas de Controle do SGBD</div><div class="card-body">
      <p class="corpo">Ameaças aos BDs envolvem: perda de <strong>integridade, disponibilidade e confidencialidade</strong> (Tríade CIA). O SGBD não age sozinho: <strong>firewalls, antivírus, segurança de rede e monitoração</strong> precisam agir colaborativamente.</p>
      <div class="importante">⭐ Segurança de BD envolve ações <strong>técnicas E administrativas</strong>. O <strong>treinamento e conscientização das equipes</strong> pode ser fator de importância maior que as ferramentas computacionais.</div>
      <div class="destaque">⭐ <strong>Memorize as 4 medidas de controle do SGBD!</strong></div>
      <table>
        <tr><th>Medida</th><th>O que faz</th></tr>
        <tr><td><strong>Controle de acesso</strong></td><td>Determina quais usuários acessam quais dados — liberação direcionada, não genérica. <strong>Dupla verificação de identidade</strong> aumenta substancialmente a segurança da identificação.</td></tr>
        <tr><td><strong>Controle de inferência</strong></td><td>Limita acesso a registros ou dados sensíveis. Importante em BDs públicos que possam ferir a privacidade de indivíduos ou empresas.</td></tr>
        <tr><td><strong>Controle de fluxo</strong></td><td>Impede <strong>vazamento secundário</strong> — mesmo que o usuário tenha acesso a dados confidenciais, garante que não os compartilhe com terceiros não autorizados.</td></tr>
        <tr><td><strong>Criptografia</strong></td><td>Impede que dados obtidos irregularmente sejam interpretados. Dados armazenados após processo criptográfico — retorno à condição original depende da <strong>chave criptográfica</strong> e do <strong>algoritmo</strong>.</td></tr>
      </table>
    </div></div>

    <div class="card"><div class="card-header azul-m">Na Prática — DBA e Acesso Corporativo</div><div class="card-body">
      <p class="corpo">Quando você é contratado em uma empresa, o <strong>DBA</strong> configura no BD de cada sistema que você precisará acessar: sua conta (usuário e senha) e seus <strong>privilégios</strong> — determinando quais registros do BD estarão visíveis para você, conforme as atribuições do seu cargo.</p>
    </div></div>`,
    questoes: [
      { tipo:"mc", enunciado:"Quem foi Herman Hollerith e qual sua contribuição para a computação?", opcoes:["Criou o primeiro SGBD relacional nos anos 1970","Foi responsável pela primeira aplicação de larga escala de BDs computacionais; sua empresa tornou-se a IBM em 1924","Inventou a linguagem SQL para consulta em BDs","Criou os primeiros BDs orientados a objetos na década de 1980"], correta:1, explicacao:"Herman Hollerith foi responsável pela primeira aplicação de larga escala de BDs computacionais rudimentares. Com o sucesso, sua empresa transformou-se em 1924 na IBM." },
      { tipo:"mc", enunciado:"Por que a evolução dos BDs sequenciais criou problemas?", opcoes:["Porque os computadores da época eram lentos demais","Porque criou problemas de inconsistência e segurança nos dados — a solução foi o SGBD","Porque cada empresa precisava comprar um novo servidor","Porque os dados passaram a ser armazenados em texto puro"], correta:1, explicacao:"A flexibilidade dos novos BDs criou problemas de inconsistência e segurança. A solução foi o SGBD, que centraliza o gerenciamento das transações." },
      { tipo:"mc", enunciado:"Qual a diferença entre DBA e DBP?", opcoes:["DBA projeta novos BDs; DBP administra BDs existentes","DBA administra o BD e SGBD existentes; DBP projeta a estrutura de novos BDs","DBA cuida da segurança; DBP cuida do desempenho","São sinônimos"], correta:1, explicacao:"DBA (Database Administrator) administra o BD e SGBD existentes. DBP (Database Project) projeta a estrutura de novos BDs para novas aplicações." },
      { tipo:"mc", enunciado:"O que é latência em um BD?", opcoes:["A capacidade máxima de armazenamento","O tempo total entre a saída de uma requisição do SI e o retorno do resultado pelo BD","O número máximo de usuários simultâneos","A velocidade de criptografia dos dados"], correta:1, explicacao:"Latência é o tempo total entre a saída de uma requisição e o retorno do resultado. O maior fator de impacto é o trânsito de pacotes na rede." },
      { tipo:"mc", enunciado:"Qual a diferença entre Data Warehouse (DW) e Data Lake (DL)?", opcoes:["DW armazena dados em nuvem; DL armazena localmente","DW armazena apenas dados estruturados (já processados); DL reúne dados brutos e estruturados indiferentemente","DW é para pequenas empresas; DL é para grandes corporações","DW usa SQL; DL usa linguagem própria"], correta:1, explicacao:"DW armazena dados estruturados (já processados). Data Lake reúne dados brutos e estruturados, permitindo análises de ciência de dados como machine learning." },
      { tipo:"mc", enunciado:"O que é um Data Mart (DM)?", opcoes:["Um BD sequencial usado em sistemas legados","Uma cópia parcial do DW, de proporções reduzidas, com consistência controlada pelo DW principal","Um sistema de backup automático do DW","Um BD dedicado exclusivamente à segurança"], correta:1, explicacao:"Data Mart é um DW de proporções reduzidas — uma cópia de parte do DW, usado quando um SI específico precisa de determinados segmentos com uso muito intenso." },
      { tipo:"mc", enunciado:"Qual medida de controle do SGBD impede que dados obtidos irregularmente sejam interpretados?", opcoes:["Controle de acesso","Controle de inferência","Controle de fluxo","Criptografia"], correta:3, explicacao:"A criptografia impede que dados obtidos irregularmente possam ser interpretados. O retorno à condição original depende da chave criptográfica e do algoritmo utilizado." },
      { tipo:"mc", enunciado:"O que é controle de fluxo em um SGBD?", opcoes:["Controla a velocidade de transferência na rede","Limita o vazamento secundário — garante que usuário autorizado não compartilhe dados confidenciais com terceiros não autorizados","Determina quais usuários podem acessar quais dados","Monitora o desempenho das queries"], correta:1, explicacao:"Controle de fluxo limita o vazamento secundário de informações — mesmo que o usuário tenha acesso, garante que não compartilhe com terceiros não autorizados." },
      { tipo:"mc", enunciado:"Por que a exportação de dados entre BDs pode ser problemática?", opcoes:["Porque é um processo muito lento e caro","Porque pode romper a consistência temporal dos dados","Porque só funciona entre BDs do mesmo fabricante","Porque apaga os dados do BD de origem"], correta:1, explicacao:"A exportação pode romper a consistência temporal — dependendo do momento da query, o dado pode estar desatualizado, gerando inconsistências nos sistemas que o consomem." },
      { tipo:"dissertativa", enunciado:"Explique o que é um SGBD e por que ele foi necessário com a evolução dos bancos de dados.", gabarito:"O SGBD (Sistema Gerenciador de Banco de Dados) é uma ferramenta que centraliza o gerenciamento das transações entre os aplicativos e o BD. Foi necessário porque a evolução dos BDs sequenciais para BDs com acessos flexíveis e unificados criou problemas de inconsistência e segurança. Com o SGBD, os SIs clientes se abstraem do processo de gravação — basta requisitar ao SGBD que armazene ou recupere os registros desejados." },
      { tipo:"dissertativa", enunciado:"Cite e explique as 4 medidas de controle implementadas por um SGBD.", gabarito:"1. Controle de acesso: determina quais usuários acessam quais dados — liberação direcionada, não genérica. Dupla verificação de identidade aumenta a segurança. 2. Controle de inferência: limita acesso a dados sensíveis, protegendo privacidade em BDs públicos. 3. Controle de fluxo: impede vazamento secundário — garante que usuário autorizado não compartilhe dados com terceiros não autorizados. 4. Criptografia: impede que dados obtidos irregularmente sejam interpretados — depende de chave criptográfica e algoritmo para retornar à condição original." },
      { tipo:"dissertativa", enunciado:"Qual a diferença entre Data Warehouse, Data Mart e Data Lake? Quando cada um é usado?", gabarito:"Data Warehouse (DW): compartilha dados estruturados (já processados) com consistência temporal garantida. Usado quando múltiplos SIs incompatíveis precisam de dados consistentes ou para histórico gerencial. Suporta OLAP, mineração de dados e big data. Data Mart (DM): cópia reduzida de parte do DW, com consistência controlada pelo DW. Usado quando um SI específico precisa de determinados segmentos com uso muito intenso. Data Lake (DL): reúne dados brutos e estruturados indiferentemente, disponíveis indefinidamente. Usado para análises de ciência de dados (machine learning, deep learning)." }
    ]
  }

};

let acertos = 0, totalMC = 0, respondidas = {};

function selecionarAula(n) {
  document.querySelectorAll('.btn-aula:not(.bloqueada)').forEach((b, i) => {
    b.classList.toggle('ativo', i === n - 1);
  });
  renderAula(n);
}

function renderAula(n) {
  const aula = dados[n];
  if (!aula) return;
  acertos = 0; totalMC = 0; respondidas = {};
  totalMC = aula.questoes.filter(q => q.tipo === 'mc').length;

  let qHTML = '';
  aula.questoes.forEach((q, i) => {
    if (q.tipo === 'mc') {
      const ops = q.opcoes.map((op, j) =>
        `<div class="opcao" id="op-${i}-${j}" onclick="selecionarOpcao(${i},${j},${q.correta})">
          <span class="opcao-letra">${String.fromCharCode(65+j)}</span><span>${op}</span>
        </div>`).join('');
      qHTML += `<div class="questao"><div class="questao-header">Questão ${i+1} — Múltipla Escolha</div>
        <div class="questao-body"><p class="questao-enunciado">${q.enunciado}</p>
        <div id="opcoes-${i}">${ops}</div>
        <div class="gabarito-box" id="gab-${i}">✅ <strong>Gabarito:</strong> ${q.opcoes[q.correta]}<br><em>${q.explicacao}</em></div>
        </div></div>`;
    } else {
      qHTML += `<div class="questao"><div class="questao-header">Questão ${i+1} — Dissertativa</div>
        <div class="questao-body"><p class="questao-enunciado">${q.enunciado}</p>
        <textarea class="campo-dissertativa" placeholder="Escreva sua resposta aqui..."></textarea><br>
        <button class="btn btn-gabarito" onclick="verGabarito(${i})">Ver gabarito</button>
        <div class="gabarito-box" id="gab-${i}">📝 <strong>Gabarito:</strong> ${q.gabarito}</div>
        </div></div>`;
    }
  });

  document.getElementById('conteudo').innerHTML = `
    <div class="tabs">
      <button class="tab ativo" onclick="trocarTab('resumo',this)">📖 Resumo</button>
      <button class="tab" onclick="trocarTab('questoes',this)">✏️ Questões (${aula.questoes.length})</button>
    </div>
    <div class="painel ativo" id="painel-resumo">
      <div class="card"><div class="card-header">${aula.titulo}</div>
      <div class="card-body"><p class="corpo" style="color:#6c757d">${aula.professor}</p></div></div>
      ${aula.resumo}
    </div>
    <div class="painel" id="painel-questoes">
      <div class="card"><div class="card-header verde">Questões — ${aula.titulo.split('—')[0].trim()}</div>
      <div class="card-body">
        <p class="progresso-texto">Progresso: <span id="prog-texto">0/${totalMC} múltipla escolha respondidas</span></p>
        <div class="progresso-bar"><div class="progresso-fill" id="prog-fill" style="width:0%"></div></div>
      </div></div>
      ${qHTML}
      <div id="resultado-final"></div>
    </div>`;
}

function trocarTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
  document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));
  el.classList.add('ativo');
  document.getElementById('painel-' + tab).classList.add('ativo');
}

function selecionarOpcao(qi, ji, correta) {
  if (respondidas[qi] !== undefined) return;
  respondidas[qi] = ji;
  document.querySelectorAll(`#opcoes-${qi} .opcao`).forEach((op, idx) => {
    if (idx === correta) op.classList.add('correta');
    else if (idx === ji && ji !== correta) op.classList.add('errada');
    op.style.cursor = 'default';
  });
  document.getElementById(`gab-${qi}`).classList.add('visivel');
  if (ji === correta) acertos++;
  atualizarProgresso();
}

function verGabarito(qi) {
  document.getElementById(`gab-${qi}`).classList.toggle('visivel');
}

function atualizarProgresso() {
  const resps = Object.keys(respondidas).length;
  const pct = totalMC > 0 ? Math.round((resps/totalMC)*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-texto').textContent = `${resps}/${totalMC} múltipla escolha respondidas`;
  if (resps === totalMC && totalMC > 0) {
    const nota = Math.round((acertos/totalMC)*100);
    const cls = nota >= 80 ? 'otimo' : nota >= 60 ? 'bom' : 'estudar';
    const msg = nota >= 80 ? '🎉 Ótimo desempenho!' : nota >= 60 ? '👍 Bom, mas revise os erros.' : '📖 Revise o resumo antes de continuar.';
    document.getElementById('resultado-final').innerHTML = `
      <div class="resultado-final ${cls}">
        <div class="nota">${nota}%</div>
        <div>${acertos}/${totalMC} questões corretas</div>
        <div style="font-size:0.85rem;margin-top:6px">${msg}</div>
      </div>`;
  }
}

renderAula(1);
</script>
